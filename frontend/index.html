<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe News | AI Tech Aggregator</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>
    
    <div class="app-container">
        <header class="header glass-panel">
            <div class="logo">
                <span class="gradient-text">Vibe News</span>
                <span class="badge">AI Powered</span>
            </div>
            <div class="actions">
                <button id="refreshBtn" class="btn primary-btn">
                    <span class="icon">🚀</span> Taramayı Tetikle
                </button>
            </div>
        </header>

        <main>
            <div class="top-section">
                <h1 class="page-title">Son Trendler & Makaleler</h1>
                <p class="subtitle">Robotik, Vibe Coding ve Yapay Zeka dünyasından en son haberler, senin için Groq AI ile özetlendi.</p>
            </div>

            <div id="loading" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Haberler çekiliyor, lütfen bekle...</p>
            </div>

            <div id="newsContainer" class="news-grid">
                <!-- Haber kartları JS tarafından buraya eklenecek -->
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
